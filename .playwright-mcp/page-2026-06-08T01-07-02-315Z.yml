        - generic "Details" [ref=e188]:
          - generic [ref=e190]:
            - paragraph [ref=e191]:
              - text: Our HDMI to IP Encoder allows you to take an HDMI output from any 1080P video source and encode it to stream over the network. The video stream can be viewed over the network on a computer, record to one of our
              - link "DVR recorders" [ref=e192] [cursor=pointer]:
                - /url: https://www.cctvcameraworld.com/cctv-security-dvrs.html
              - text: ", or upload the stream to YouTube. Setup is easy by connecting the encoder to your network, and plugging in the HDMI cable for the device you would like to stream. After the devices are connected you can access the encoder using a web interface to configure it and start streaming to your favorite services like YouTube, Facebook Live, Twitch, or Livestream. You can also backup the output of this encoder to any of our"
              - link "Network Video Recorders" [ref=e193] [cursor=pointer]:
                - /url: https://www.cctvcameraworld.com/network-video-recorders-ip-cameras.html
              - text: by adding it as a camera.
            - paragraph [ref=e194]: Please note all transcoding has a certain latency or delay associated with it. Usually it is 1-2 seconds on high speed 1 gigabit networks without any hops. If your application is sensitive to video latency then please do not use such transcoders.
            - paragraph [ref=e195]: Possible Use Scenarios
            - paragraph [ref=e196]:
              - img [ref=e197]
            - paragraph [ref=e198]:
              - text: To make it easier for our users to get the most out of our HDMI to IP video encoder (HDMIP) we've made the following tutorial videos. The first video is an overview of how to use the video encoder to take a 1080P video input and capture it on a
              - link "NVR recorder" [ref=e199] [cursor=pointer]:
                - /url: https://www.cctvcameraworld.com/network-video-recorders-ip-cameras.html
              - text: . In this tutorial we show how to capture the NVR's own video output and record it as a video channel over the network using the ONVIF video standard. We provide an overview of the basic settings needed to use the HDMIP encoder from start to finish.
            - generic [ref=e201]:
              - img "click to play the video" [ref=e202] [cursor=pointer]
              - button "Play" [ref=e203] [cursor=pointer]:
                - img [ref=e204]
            - paragraph [ref=e207]:
              - text: In the second video below we show this video encoder can be used to capture a HDMI video signal and streamed directly to the back of our
              - link "PoE NVR" [ref=e208] [cursor=pointer]:
                - /url: https://www.cctvcameraworld.com/poe-nvr-recorders.html
              - text: . Standalone PoE NVRs have plug and play PoE ports that are engineered for use specifically with our
              - link "PoE cameras" [ref=e209] [cursor=pointer]:
                - /url: https://www.cctvcameraworld.com/poe-cameras.html
              - text: . The plug and play operation on the cameras does not require the user to posses any networking knowledge. However, when adding ONVIF devices such as this video encoder, you have to login to the encoder and set it to an IP address in the subnet 10.1.1.X for it to be detected by the PoE NVR. We show the whole process from beginning to end. In the video we show how to capture the video output from a computer for recording to an NVR.
            - generic [ref=e211]:
              - img "click to play the video" [ref=e212] [cursor=pointer]
              - button "Play" [ref=e213] [cursor=pointer]:
                - img [ref=e214]
            - paragraph [ref=e217]: You can even use this video encoder to stream video directly to YouTube Live. As long as you have both video and audio on the HDMI signal, it can be pushed to YouTube. We explain the process in the video below
            - generic [ref=e219]:
              - img "click to play the video" [ref=e220] [cursor=pointer]
              - button "Play" [ref=e221] [cursor=pointer]:
                - img [ref=e222]
            - paragraph [ref=e225]: Features
